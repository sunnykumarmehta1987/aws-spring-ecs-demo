name: Deploy to ECS (Manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter image tag (example: build-12)"
        required: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Fetch values from SSM (FIXED)
      - name: Fetch infra values from SSM
        run: |
          set -e

          get_param () {
            NAME=$1
            echo "Fetching parameter: $NAME" >&2

            VALUE=$(aws ssm get-parameter \
              --name "$NAME" \
              --query "Parameter.Value" \
              --output text 2>/dev/null) || {
                echo "❌ Failed to fetch: $NAME" >&2
                exit 1
              }

            echo "✅ Success: $NAME" >&2
            echo "$VALUE"
          }

          ECS_CLUSTER=$(get_param "/dev/ecommerce/ecs_cluster_name")
          ECS_SERVICE=$(get_param "/dev/ecommerce/ecs_service_name")
          ECR_REPOSITORY=$(get_param "/dev/ecommerce/ecr_repo_name")
          TASK_FAMILY=$(get_param "/dev/ecommerce/ecs_task_family")

          echo "TASK_FAMILY=$TASK_FAMILY" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$ECS_CLUSTER" >> $GITHUB_ENV
          echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$ECR_REPOSITORY" >> $GITHUB_ENV

      # 3. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 5. Deploy
      - name: Deploy to ECS
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ github.event.inputs.image_tag }}

          echo "Deploying image: $IMAGE_URI"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "$IMAGE_URI" '
            .containerDefinitions[0].image=$IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ')

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $NEW_REVISION"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $NEW_REVISION