name: Deploy to ECS (Manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Select image tag (example: build-12)"
        required: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TASK_FAMILY: spring-app-task-new

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. AWS Login
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Fetch infra values from SSM (NO MANUAL VALUES)
      - name: Fetch infra values from SSM
        run: |
          ECS_CLUSTER=$(aws ssm get-parameter \
            --name "/myapp/ecs_cluster_name" \
            --query "Parameter.Value" \
            --output text)

          ECS_SERVICE=$(aws ssm get-parameter \
            --name "/myapp/ecs_service_name" \
            --query "Parameter.Value" \
            --output text)

          ECR_REPOSITORY=$(aws ssm get-parameter \
            --name "/myapp/ecr_repo_name" \
            --query "Parameter.Value" \
            --output text)

          echo "ECS_CLUSTER=$ECS_CLUSTER" >> $GITHUB_ENV
          echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=$ECR_REPOSITORY" >> $GITHUB_ENV

      # 3. Login to ECR (optional but fine to keep)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. FORCE DEPLOY (NO TASK DEF REBUILD)
      - name: Deploy to ECS
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ github.event.inputs.image_tag }}

          echo "Deploying image: $IMAGE_URI"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment